<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="assets/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="container">

            <!-- Search row -->
            <div class="search-box">
                <div class="input-wrap">
                    <svg class="search-icon" viewBox="0 0 20 20" fill="none">
                        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M15 15L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="cityInput" placeholder="Buscar cidade..." autocomplete="off" spellcheck="false" aria-label="Buscar cidade">
                    <button id="clearBtn" class="icon-btn clear-btn" aria-label="Limpar" style="display:none;">
                        <svg viewBox="0 0 20 20" fill="none">
                            <path d="M14 6L6 14M6 6L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button id="geoBtn" class="icon-btn geo-btn" aria-label="Usar minha localização">
                        <svg viewBox="0 0 22 22" fill="none">
                            <circle cx="11" cy="11" r="3.5" stroke="currentColor" stroke-width="1.4"/>
                            <path d="M11 2V5M11 17V20M2 11H5M17 11H20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div id="autocompleteList" class="autocomplete-list" role="listbox" aria-label="Sugestões"></div>
            </div>

            <!-- Weather Card — tamanho FIXO, nunca encolhe -->
            <main id="weatherInfo" class="weather-card" aria-live="polite">

                <!-- Fundo animado contextual -->
                <canvas id="weatherCanvas" aria-hidden="true"></canvas>

                <!-- Skeleton (mesmo tamanho do real content) -->
                <div id="skeleton" class="skeleton-card" aria-hidden="true">
                    <div class="skeleton sk-icon"></div>
                    <div class="skeleton sk-temp"></div>
                    <div class="skeleton sk-line"></div>
                    <div class="skeleton sk-line small"></div>
                    <div class="sk-pills-row">
                        <div class="skeleton sk-pill"></div>
                        <div class="skeleton sk-pill"></div>
                        <div class="skeleton sk-pill"></div>
                    </div>
                </div>

                <!-- Real Content -->
                <div id="realContent" class="real-content" style="display:none; opacity:0;">

                    <div class="weather-icon-wrap">
                        <div id="weatherSvgIcon" class="weather-svg-icon" aria-hidden="true"></div>
                        <span id="weatherCondition" class="condition-text"></span>
                    </div>

                    <div class="temp-primary">
                        <span id="temp">--</span><span class="degree-unit">°C</span>
                    </div>

                    <div class="feelslike-row">
                        Sensação <span id="feelslike">--°</span>
                    </div>

                    <div class="location-row">
                        <strong id="city"></strong><span class="sep">, </span><span id="region"></span>
                    </div>

                    <div class="extra-details">
                        <div class="detail-pill">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 3C12 3 7 9 7 14C7 16.76 9.24 19 12 19C14.76 19 17 16.76 17 14C17 9 12 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M9.5 14.5C9.5 15.88 10.62 17 12 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <span id="humidity">--</span>
                            <small>Umidade</small>
                        </div>
                        <div class="detail-pill">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M4 8H14C15.66 8 17 6.66 17 5C17 3.34 15.66 2 14 2C12.34 2 11 3.34 11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M4 12H18C19.66 12 21 13.34 21 15C21 16.66 19.66 18 18 18C16.34 18 15 16.66 15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M4 16H11C12.66 16 14 17.34 14 19C14 20.66 12.66 22 11 22C9.34 22 8 20.66 8 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <span id="wind">--</span>
                            <small>km/h</small>
                        </div>
                        <div class="detail-pill">
                            <svg viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M12 2V5M12 19V22M2 12H5M19 12H22M4.93 4.93L7.05 7.05M16.95 16.95L19.07 19.07M19.07 4.93L16.95 7.05M7.05 16.95L4.93 19.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <span id="uv">--</span>
                            <small>Índice UV</small>
                        </div>
                    </div>

                    <div class="minmax-row">
                        <span>↑ <strong id="maxTemp">--°</strong></span>
                        <span class="minmax-sep">·</span>
                        <span>↓ <strong id="minTemp">--°</strong></span>
                    </div>

                </div>

                <!-- Error -->
                <div id="errorContent" class="error-state" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 8V12M12 16H12.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <p id="errorMsg">Cidade não encontrada</p>
                    <small>Tente outro nome ou em inglês</small>
                </div>

            </main>

            <p id="location" class="location-text">Detectando localização...</p>

            <footer>
                Feito com WeatherAPI.com &nbsp;·&nbsp; <small>Por Marta Isabelle</small>
            </footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
