<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header>
                <h1>Tempo</h1>
                <p id="location" class="location-text">Detectando localização...</p>
            </header>

            <div class="search-box">
                <div class="input-wrap">
                    <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M15 15L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="cityInput" placeholder="Buscar cidade ou país..." autocomplete="off" spellcheck="false">
                    <button id="clearBtn" class="clear-btn" aria-label="Limpar busca" style="display:none;">
                        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div id="autocompleteList" class="autocomplete-list" role="listbox" aria-label="Sugestões de cidades"></div>
            </div>

            <main id="weatherInfo" class="weather-card hidden" aria-live="polite">

                <div id="skeleton" class="skeleton-card" aria-hidden="true">
                    <div class="skeleton skeleton-temp"></div>
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line small"></div>
                </div>

                <div id="realContent" style="display:none;">
                    <div class="weather-icon-wrap">
                        <img id="weatherIcon" src="" alt="Condição climática" width="64" height="64">
                        <span id="weatherCondition" class="condition-text"></span>
                    </div>
                    <div class="temp-primary">
                        <span id="temp">--</span><span class="degree-unit">°C</span>
                    </div>
                    <div class="feelslike">
                        Sensação <span id="feelslike">--°</span>
                    </div>
                    <div class="details">
                        <p><strong id="city"></strong><span class="region-sep">, </span><span id="region"></span></p>
                    </div>
                    <div class="extra-details">
                        <div class="detail-pill">
                            <svg viewBox="0 0 20 20" fill="none"><path d="M10 3C10 3 6 7 6 11C6 13.21 7.79 15 10 15C12.21 15 14 13.21 14 11C14 7 10 3 10 3Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
                            <span id="humidity">--%</span>
                            <small>Umidade</small>
                        </div>
                        <div class="detail-pill">
                            <svg viewBox="0 0 20 20" fill="none"><path d="M3 10H13C14.66 10 16 8.66 16 7C16 5.34 14.66 4 13 4C11.34 4 10 5.34 10 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M3 14H11C12.66 14 14 15.34 14 17" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                            <span id="wind">-- km/h</span>
                            <small>Vento</small>
                        </div>
                        <div class="detail-pill">
                            <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.3"/><path d="M10 2V4M10 16V18M2 10H4M16 10H18M4.22 4.22L5.64 5.64M14.36 14.36L15.78 15.78M15.78 4.22L14.36 5.64M5.64 14.36L4.22 15.78" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                            <span id="uv">--</span>
                            <small>UV</small>
                        </div>
                    </div>
                </div>

                <div id="errorContent" class="error-state" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8V12M12 16H12.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <p id="errorMsg">Cidade não encontrada</p>
                    <small>Tente um nome diferente ou em inglês</small>
                </div>

            </main>

            <footer>
                Feito com WeatherAPI.com<br>
                <small>Por Marta Isabelle</small>
            </footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
